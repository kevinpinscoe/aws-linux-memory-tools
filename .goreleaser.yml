# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: aws-linux-memory-tools
    main: .
    binary: aws-linux-memory-tools
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0

archives:
  - id: aws-linux-memory-tools-archive
    builds: [aws-linux-memory-tools]
    name_template: "aws-linux-memory-tools-{{ .Os }}-{{ .Arch }}"
    format: binary

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    certificate: ${artifact}.pem
    signature: ${artifact}.sig
    output: true

release:
  github:
    owner: kevinpinscoe
    name: aws-linux-memory-tools
  name_template: "v{{ .Version }}"
  make_latest: true
  generate_release_notes: true
